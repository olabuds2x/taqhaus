  <!-- Google Fonts — Noto Serif (headlines) + Plus Jakarta Sans (body) + Inter (labels) -->

  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#FF5722" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />

  <meta property="twitter:url" content="https://taqhaus.com" />

    content="We engineer growth that scales and influence that sticks. Marketing and influence consultancy for ambitious brands, leaders, and institutions." />

  <!-- Structured Data - Organization Schema -->

      "name": "TaqHaus",
      "url": "https://taqhaus.com",
      "logo": "/taqhaus-logo-dark.png",

      "sameAs": [
        "https://linkedin.com/company/taqhaus",
        "https://twitter.com/taqhaus"
      ],
      "contactPoint": {

        "Digital Marketing",
        "SEO Services",
